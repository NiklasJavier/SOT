# Default configuration for the DevOps toolkit. Values marked with
# __GENERATE_*__ are dynamically derived by the setup script and the
# Ansible variable role.
system_name: __GENERATE_SYSTEM_NAME__
username: __GENERATE_USERNAME__
ssh_port: "282"
log_level: "info"
log_file: "/var/log/devops_commands.log"
use_defaults: "false"
tools: "ansible docker sdkman"
ssh_key_function_enabled: "false"
ssh_key_public: ""
clone_dir: "/etc/DevOpsToolkit"
modules_dir: __GENERATE_MODULES_DIR__
scripts_dir: __GENERATE_SCRIPTS_DIR__
pipelines_dir: __GENERATE_PIPELINES_DIR__
ansible_local_enabled: "true"
ansible_local_priority: "true"
ansible_local_dir: __GENERATE_ANSIBLE_LOCAL_DIR__
overrides_dir: __GENERATE_OVERRIDES_DIR__
opt_data_dir: __GENERATE_OPT_DATA_DIR__
systemlink_path: "/usr/sbin/SOT"
vault_file: __GENERATE_VAULT_FILE__
vault_secret: __GENERATE_VAULT_SECRET__
vault_content: __GENERATE_VAULT_CONTENT__
vault_mail: __GENERATE_VAULT_MAIL__
branch: "production"

# =============================================================================
# Integrationen (Dynamisches System)
# =============================================================================
# Jede Integration benötigt:
#   <name>_enabled      - "true" oder "false"
#   <name>_repo_url     - Git Repository URL
#   <name>_dir          - Lokales Verzeichnis
#   <name>_branch       - Git Branch
#   <name>_type         - ansible|terraform|custom|script
#   <name>_runner       - Entry-Point Skript (default: runner.sh)
#   <name>_description  - Beschreibung für CLI
#
# Optional für Ansible-Integrationen:
#   <name>_inventory_path - Pfad zum Inventory
#   <name>_inventory_vars - Variablen für Inventory
#
# HINWEIS: Extensions sind OPTIONAL. Setze <name>_enabled auf "false"
#          um eine Extension zu deaktivieren. Das Setup überspringt
#          dann automatisch das Klonen/Aktualisieren dieser Extension.
#
# Neue Extension hinzufügen:
#   1. Kopiere den AAT/TID Block
#   2. Ersetze den Prefix (<name>_)
#   3. Passe die Werte an
#   4. Starte `sot extensions sync` zum Installieren

# =============================================================================
# Extension: AAT - Ansible Automation Tools (OPTIONAL)
# =============================================================================
aat_enabled: "false"
aat_repo_url: "https://github.com/NiklasJavier/AAT.git"
aat_dir: "/opt/AAT"
aat_branch: "main"
aat_type: "ansible"
aat_runner: "runner.sh"
aat_description: "Ansible Automation Tools"
aat_inventory_path: "host.ini"
aat_inventory_vars: "ssh_port system_name"

# =============================================================================
# Extension: TID - Terraform Infrastructure Deployment (OPTIONAL)
# =============================================================================
tid_enabled: "false"
tid_repo_url: "https://github.com/NiklasJavier/TID.git"
tid_dir: "/opt/TID"
tid_branch: "main"
tid_type: "terraform"
tid_runner: "runner.sh"
tid_description: "Terraform Infrastructure Deployment"
tid_inventory_path: "host.ini"
tid_inventory_vars: "ssh_port system_name"

# =============================================================================
# Beispiel für weitere Extension (auskommentiert)
# =============================================================================
# mytools_enabled: "false"
# mytools_repo_url: "https://github.com/example/mytools.git"
# mytools_dir: "/opt/MYTOOLS"
# mytools_branch: "main"
# mytools_type: "script"
# mytools_runner: "run.sh"
# mytools_description: "Meine Custom Tools"

# =============================================================================
# Runner-Konfiguration
# =============================================================================
runner_enabled: "true"
runner_default_mode: "aat"
runner_sync_before_run: "true"
runner_work_dir: "__GENERATE_RUNNER_WORK_DIR__"
runner_log_dir: "__GENERATE_RUNNER_LOG_DIR__"
runner_default_inventory: ""
runner_aat_playbook_dir: ""
runner_tid_stack_dir: ""
