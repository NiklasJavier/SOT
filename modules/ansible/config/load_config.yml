---
- name: Load default configuration values
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../../../services/default_config.yml"
    name: default_config

- name: Extract default configuration map
  ansible.builtin.set_fact:
    default_config_map: "{{ default_config.sot | default(default_config) }}"

- name: Ensure configuration overrides exist when provided
  ansible.builtin.stat:
    path: "{{ CONFIG_YAML }}"
  register: sot_config_override
  when: CONFIG_YAML is defined

- name: Abort when configuration overrides are missing
  ansible.builtin.fail:
    msg: "CONFIG_YAML '{{ CONFIG_YAML }}' was provided but the file does not exist."
  when: CONFIG_YAML is defined and not sot_config_override.stat.exists

- name: Load configuration overrides from config.yaml
  ansible.builtin.include_vars:
    file: "{{ CONFIG_YAML }}"
    name: custom_config
  when: CONFIG_YAML is defined
  register: sot_custom_config

- name: Extract override configuration map
  ansible.builtin.set_fact:
    custom_config_map: "{{ sot_custom_config.ansible_facts.sot | default(sot_custom_config.ansible_facts | default({})) }}"
  when: CONFIG_YAML is defined

- name: Ensure override map is defined
  ansible.builtin.set_fact:
    custom_config_map: {}
  when: custom_config_map is not defined

- name: Merge configuration defaults with overrides
  ansible.builtin.set_fact:
    merged_config: "{{ default_config_map | combine(custom_config_map, recursive=True) }}"

- name: Flatten configuration for consumers expecting legacy keys
  ansible.builtin.set_fact:
    sot_config:
      branch: "{{ merged_config.branch | default('production') }}"
      system_name: "{{ merged_config.user.system_name | default('__GENERATE_SYSTEM_NAME__') }}"
      username: "{{ merged_config.user.username | default('__GENERATE_USERNAME__') }}"
      ssh_port: "{{ merged_config.user.ssh_port | default('282') }}"
      log_level: "{{ merged_config.logging.level | default('info') }}"
      log_file: "{{ merged_config.logging.file | default('/var/log/sot/cli.log') }}"
      use_defaults: "{{ merged_config.flags.use_defaults | default('false') }}"
      tools: "{{ merged_config.tools.list | default('') }}"
      ssh_key_function_enabled: "{{ merged_config.ssh.key_function_enabled | default('false') }}"
      ssh_key_public: "{{ merged_config.ssh.public_key | default('') }}"
      clone_dir: "{{ merged_config.paths.clone | default('/opt/sot') }}"
      modules_dir: "{{ merged_config.paths.modules | default('/opt/sot/modules') }}"
      scripts_dir: "{{ merged_config.paths.scripts | default('/opt/sot/scripts') }}"
      pipelines_dir: "{{ merged_config.paths.pipelines | default('/opt/sot/pipelines') }}"
      ansible_local_dir: "{{ merged_config.paths.ansible_local | default('/opt/sot/modules/ansible') }}"
      ansible_local_enabled: "{{ (merged_config.ansible.local.enabled | default(true)) | bool | ternary('true', 'false') }}"
      ansible_local_priority: "{{ (merged_config.ansible.local.priority | default(true)) | bool | ternary('true', 'false') }}"
      overrides_dir: "{{ merged_config.paths.overrides | default('/etc/sot/overrides') }}"
      opt_data_dir: "{{ merged_config.paths.opt_data | default('/var/lib/sot') }}"
      systemlink_path: "{{ merged_config.paths.systemlink | default('/usr/sbin/SOT') }}"
      vault_file: "{{ merged_config.vault.file | default('/etc/sot/vault.yml') }}"
      vault_secret: "{{ merged_config.vault.secret | default('local-secret') }}"
      vault_content: "{{ merged_config.vault.content | default('__GENERATE_VAULT_CONTENT__') }}"
      vault_mail: "{{ merged_config.vault.mail | default('__GENERATE_VAULT_MAIL__') }}"
      aat_enabled: "{{ (merged_config.aat.enabled | default(true)) | bool | ternary('true', 'false') }}"
      aat_repo_url: "{{ merged_config.aat.repo | default('https://github.com/NiklasJavier/AAT.git') }}"
      aat_dir: "{{ merged_config.aat.dir | default('/opt/AAT') }}"
      aat_branch: "{{ merged_config.aat.branch | default('main') }}"
      aat_inventory_path: "{{ merged_config.aat.inventory.path | default('host.ini') }}"
      aat_inventory_vars: "{{ (merged_config.aat.inventory.vars | default([])) | join(' ') }}"
      tid_enabled: "{{ (merged_config.tid.enabled | default(true)) | bool | ternary('true', 'false') }}"
      tid_repo_url: "{{ merged_config.tid.repo | default('https://github.com/NiklasJavier/TID.git') }}"
      tid_dir: "{{ merged_config.tid.dir | default('/opt/TID') }}"
      tid_branch: "{{ merged_config.tid.branch | default('main') }}"
      tid_inventory_path: "{{ merged_config.tid.inventory.path | default('host.ini') }}"
      tid_inventory_vars: "{{ (merged_config.tid.inventory.vars | default([])) | join(' ') }}"
      runner_enabled: "{{ (merged_config.runner.enabled | default(true)) | bool | ternary('true', 'false') }}"
      runner_default_mode: "{{ merged_config.runner.mode | default('aat') }}"
      runner_sync_before_run: "{{ (merged_config.runner.sync_before_run | default(true)) | bool | ternary('true', 'false') }}"
      runner_work_dir: "{{ merged_config.runner.work_dir | default('/var/lib/sot/runner') }}"
      runner_log_dir: "{{ merged_config.runner.log_dir | default('/var/log/sot/runner') }}"
      runner_default_inventory: "{{ merged_config.runner.default_inventory | default('') }}"
      runner_aat_playbook_dir: "{{ merged_config.runner.aat_playbook_dir | default('') }}"
      runner_tid_stack_dir: "{{ merged_config.runner.tid_stack_dir | default('') }}"

- name: Generate username when requested
  ansible.builtin.set_fact:
    sot_config: "{{ sot_config | combine({'username': lookup('password', '/dev/null', length=11, chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ')}) }}"
  when: sot_config.username is not defined or sot_config.username | length == 0 or sot_config.username == '__GENERATE_USERNAME__'

- name: Ensure system name is available
  ansible.builtin.set_fact:
    sot_config: "{{ sot_config | combine({'system_name': 'SRV-' + sot_config.username}) }}"
  when: sot_config.system_name is not defined or sot_config.system_name | length == 0 or sot_config.system_name == '__GENERATE_SYSTEM_NAME__'

- name: Derive opt_data_dir from system name when required
  ansible.builtin.set_fact:
    sot_config: "{{ sot_config | combine({'opt_data_dir': '/opt/' + sot_config.system_name}) }}"
  when: sot_config.opt_data_dir is not defined or sot_config.opt_data_dir | length == 0 or sot_config.opt_data_dir == '__GENERATE_OPT_DATA_DIR__'

- name: Build modules_dir path when not provided
  ansible.builtin.set_fact:
    sot_config: "{{ sot_config | combine({'modules_dir': sot_config.clone_dir + '/modules'}) }}"
  when: sot_config.modules_dir is not defined or sot_config.modules_dir | length == 0 or sot_config.modules_dir == '__GENERATE_MODULES_DIR__'

- name: Determine local ansible directory when required
  ansible.builtin.set_fact:
    sot_config: "{{ sot_config | combine({'ansible_local_dir': sot_config.modules_dir + '/ansible'}) }}"
  when: sot_config.ansible_local_dir is not defined or sot_config.ansible_local_dir | length == 0 or sot_config.ansible_local_dir == '__GENERATE_ANSIBLE_LOCAL_DIR__'

- name: Build scripts_dir path when not provided
  ansible.builtin.set_fact:
    sot_config: "{{ sot_config | combine({'scripts_dir': sot_config.clone_dir + '/scripts'}) }}"
  when: sot_config.scripts_dir is not defined or sot_config.scripts_dir | length == 0 or sot_config.scripts_dir == '__GENERATE_SCRIPTS_DIR__'

- name: Build pipelines_dir path when not provided
  ansible.builtin.set_fact:
    sot_config: "{{ sot_config | combine({'pipelines_dir': sot_config.clone_dir + '/pipelines'}) }}"
  when: sot_config.pipelines_dir is not defined or sot_config.pipelines_dir | length == 0 or sot_config.pipelines_dir == '__GENERATE_PIPELINES_DIR__'

- name: Derive vault file path when required
  ansible.builtin.set_fact:
    sot_config: "{{ sot_config | combine({'vault_file': sot_config.opt_data_dir + '/vault.yml'}) }}"
  when: sot_config.vault_file is not defined or sot_config.vault_file | length == 0 or sot_config.vault_file == '__GENERATE_VAULT_FILE__'

- name: Generate vault secret when required
  ansible.builtin.set_fact:
    sot_config: "{{ sot_config | combine({'vault_secret': lookup('password', '/dev/null', length=60)}) }}"
  when: sot_config.vault_secret is not defined or sot_config.vault_secret | length == 0 or sot_config.vault_secret == '__GENERATE_VAULT_SECRET__'

- name: Determine vault content template path
  ansible.builtin.set_fact:
    sot_config: "{{ sot_config | combine({'vault_content': sot_config.clone_dir + '/setup/vault_template.j2'}) }}"
  when: sot_config.vault_content is not defined or sot_config.vault_content | length == 0 or sot_config.vault_content == '__GENERATE_VAULT_CONTENT__'

- name: Provide default vault notification address
  ansible.builtin.set_fact:
    sot_config: "{{ sot_config | combine({'vault_mail': sot_config.username + '@'}) }}"
  when: sot_config.vault_mail is not defined or sot_config.vault_mail | length == 0 or sot_config.vault_mail == '__GENERATE_VAULT_MAIL__'

- name: Determine overrides directory when required
  ansible.builtin.set_fact:
    sot_config: "{{ sot_config | combine({'overrides_dir': sot_config.clone_dir + '/services/overrides'}) }}"
  when: sot_config.overrides_dir is not defined or sot_config.overrides_dir | length == 0 or sot_config.overrides_dir == '__GENERATE_OVERRIDES_DIR__'

- name: Expose configuration values as individual facts
  ansible.builtin.set_fact:
    ansible_facts: "{{ sot_config }}"
