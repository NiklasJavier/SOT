name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Unit Tests - Schnelle Tests ohne Installation
  # ==========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run helpers tests
        run: ./ci/run-helpers-tests.sh

      - name: Run YAML parser tests
        run: ./ci/run-yaml-tests.sh

      - name: Run setup library tests
        run: ./ci/run-setup-tests.sh

  # ==========================================================================
  # Integration Tests - Benötigt vollständige Installation
  # ==========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      SOT_VAULT_SECRET: ${{ secrets.SOT_VAULT_SECRET }}
      SOT_VAULT_MAIL: ${{ secrets.SOT_VAULT_MAIL }}
      SOT_BRANCH: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Prepare CI environment
        run: ./ci/setup-env.sh

      - name: Setup SOT (local)
        run: |
          set -euo pipefail
          sudo bash setup/setup_sot.sh -branch "$SOT_BRANCH" -port "22"

      - name: Run integration tests
        run: ./ci/run-integration-tests.sh

      - name: Run CLI smoke tests
        run: ./ci/run-cli-tests.sh

      - name: Validate configuration
        run: ./ci/run-config-validation.sh

      - name: Exercise vault workflow
        run: ./ci/run-vault-tests.sh

  # ==========================================================================
  # Full Test Suite - Alle Tests zusammen
  # ==========================================================================
  full-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Prepare CI environment
        run: ./ci/setup-env.sh

      - name: Setup SOT (local)
        run: |
          sudo bash setup/setup_sot.sh -branch "${{ github.ref_name }}" -port "22"

      - name: Run all tests
        run: ./ci/run-all-tests.sh

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Full Suite | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
