name: Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SOT_VAULT_SECRET: ${{ secrets.SOT_VAULT_SECRET }}
      SOT_VAULT_MAIL: ${{ secrets.SOT_VAULT_MAIL }}
      SOT_BRANCH: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint
      - name: Prepare CI environment
        run: ci/setup-env.sh
      - name: Provision setup script from upstream
        run: |
          set -euo pipefail
          branch="${SOT_BRANCH}"
          upstream="https://raw.githubusercontent.com/NiklasJavier/SOT"
          if ! curl -fIs "$upstream/$branch/setup/setup_sot.sh" >/dev/null; then
            echo "Upstream branch '$branch' not found, falling back to 'production'."
            branch="production"
          fi
          curl -fsSL "$upstream/$branch/setup/setup_sot.sh" \
            | bash -s -- -branch "$branch" -port "22"
          SOT setup
      - name: CLI help command
        run: bash setup/cli_wrapper.sh help
        env:
          CONFIG_FILE: ${{ env.CONFIG_FILE }}
      - name: Run AAT test playbook
        run: SOT aat run /opt/AAT/playbooks/test-playbook.yml
      - name: Run CLI smoke suite
        run: ci/run-cli-tests.sh
      - name: Validate configuration
        run: ci/run-config-validation.sh
      - name: Exercise vault workflow
        run: ci/run-vault-tests.sh
