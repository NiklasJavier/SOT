name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag (e.g. v1.2.3). Leave empty for timestamp based tag."
        required: false
      prerelease:
        description: "Mark the release as pre-release"
        required: false
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Determine release tag
        id: release_tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="v$(date +%Y.%m.%d.%H%M%S)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Create tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "github-actions"
          git tag "${{ steps.release_tag.outputs.tag }}"
          git push origin "${{ steps.release_tag.outputs.tag }}"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Release ${{ steps.release_tag.outputs.tag }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
