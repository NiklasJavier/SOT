name: Security Scan

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, production]
  schedule:
    # Wöchentlich Montags um 6:00 UTC
    - cron: '0 6 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Secret Scanning - Findet versehentlich committete Secrets
  # ==========================================================================
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Vollständige Historie für Deep-Scan

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: GitLeaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # ShellCheck Strict - Strenge statische Analyse
  # ==========================================================================
  shellcheck-strict:
    name: ShellCheck (Strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on lib/
        run: |
          echo "## ShellCheck Results - lib/" >> $GITHUB_STEP_SUMMARY
          shellcheck -S warning -f gcc lib/*.sh lib/core/bootstrap/*.sh 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true

      - name: Run ShellCheck on scripts/
        run: |
          echo "## ShellCheck Results - scripts/" >> $GITHUB_STEP_SUMMARY
          find scripts -name "*.sh" -exec shellcheck -S warning -f gcc {} \; 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true

      - name: Run ShellCheck on bootstrap/
        run: |
          echo "## ShellCheck Results - bootstrap/" >> $GITHUB_STEP_SUMMARY
          shellcheck -S warning -f gcc bootstrap/*.sh 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true

      - name: Run ShellCheck on ci/
        run: |
          echo "## ShellCheck Results - ci/" >> $GITHUB_STEP_SUMMARY
          shellcheck -S warning -f gcc ci/*.sh 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true

  # ==========================================================================
  # YAML Security - Prüft YAML-Dateien auf Sicherheitsprobleme
  # ==========================================================================
  yaml-security:
    name: YAML Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets in YAML
        run: |
          echo "Scanning YAML files for potential secrets..."
          # Suche nach verdächtigen Patterns
          PATTERNS=(
            "password:"
            "secret:"
            "api_key:"
            "token:"
            "private_key:"
            "BEGIN RSA"
            "BEGIN OPENSSH"
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -rn --include="*.yml" --include="*.yaml" -i "$pattern" . 2>/dev/null | grep -v "vault_secret:" | grep -v "__GENERATE_"; then
              echo "⚠️ Potential secret pattern found: $pattern"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo "::warning::Potential secrets found in YAML files. Please review."
          else
            echo "✅ No obvious secrets found in YAML files"
          fi

  # ==========================================================================
  # Permissions Check - Prüft Dateiberechtigungen
  # ==========================================================================
  permissions-check:
    name: File Permissions Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for overly permissive files
        run: |
          echo "## File Permissions Audit" >> $GITHUB_STEP_SUMMARY

          # Finde Dateien die ausführbar sind, aber nicht .sh
          echo "### Unexpected executable files:" >> $GITHUB_STEP_SUMMARY
          find . -type f -executable ! -name "*.sh" ! -path "./.git/*" | tee -a $GITHUB_STEP_SUMMARY || echo "None found" >> $GITHUB_STEP_SUMMARY

          # Prüfe ob sensible Dateien richtige Permissions haben
          echo "### Sensitive files check:" >> $GITHUB_STEP_SUMMARY
          for f in $(find . -name "*.j2" -o -name "*vault*" ! -path "./.git/*"); do
            echo "- $f" >> $GITHUB_STEP_SUMMARY
          done

  # ==========================================================================
  # Dependency Check - Prüft auf bekannte Schwachstellen
  # ==========================================================================
  ansible-security:
    name: Ansible Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Run ansible-lint security rules
        run: |
          echo "## Ansible Security Lint" >> $GITHUB_STEP_SUMMARY
          cd modules/ansible
          ansible-lint -p --profile safety playbooks/ roles/ 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
        continue-on-error: true

  # ==========================================================================
  # Summary Job
  # ==========================================================================
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [secrets-scan, shellcheck-strict, yaml-security, permissions-check, ansible-security]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "# 🔐 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.secrets-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ShellCheck | ${{ needs.shellcheck-strict.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YAML Security | ${{ needs.yaml-security.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Permissions | ${{ needs.permissions-check.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ansible Lint | ${{ needs.ansible-security.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
