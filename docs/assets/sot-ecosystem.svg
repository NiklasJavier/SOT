<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-label="SOT Ecosystem: SOT orchestrates AAT (Ansible) and TID (Terraform)">
  <title>SOT Ecosystem</title>
  <defs>
    <linearGradient id="gSOT" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <style>
      .title { font: 700 22px system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial; fill: #111827; }
      .text  { font: 13px system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial; fill: #374151; }
      .label { font: 600 14px system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial; fill: #111827; }
      .muted { fill: #6B7280; }
      .box   { fill: #ffffff; stroke: #E5E7EB; stroke-width: 1.2; rx: 12; }
      .pill  { fill: #F3F4F6; stroke: #E5E7EB; rx: 8; }
      .sot   { fill: url(#gSOT); stroke: #E5E7EB; stroke-width: 1.2; rx: 16; }
      .arrow { stroke: #9CA3AF; stroke-width: 2.4; marker-end: url(#arrowhead); }
      .arrow2{ stroke: #93C5FD; stroke-width: 2.4; marker-end: url(#arrowhead2); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#9CA3AF" />
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#93C5FD" />
    </marker>
  </defs>

  <!-- Header -->
  <text x="30" y="44" class="title">SOT — Ecosystem Übersicht</text>
  <text x="30" y="66" class="text">SOT (CLI) orchestriert AAT (Ansible) und TID (Terraform) für Setup, Betrieb und Provisionierung.</text>

  <!-- Center: SOT -->
  <rect x="390" y="120" width="200" height="80" class="sot"/>
  <text x="430" y="165" class="label" fill="#ffffff">SOT CLI</text>
  <text x="408" y="185" class="text" fill="#F9FAFB">devops • config.yaml • vault</text>

  <!-- Left: AAT -->
  <rect x="60" y="220" width="320" height="150" class="box"/>
  <text x="80" y="248" class="label">AAT — Ansible Automation Tools</text>
  <text x="80" y="270" class="text">Playbooks, Rollen, Inventories, Secrets (Vault)</text>
  <rect x="80" y="285" width="280" height="28" class="pill"/>
  <text x="90" y="303" class="text">Pfad: /opt/AAT  •  Repo: github.com/NiklasJavier/AAT</text>
  <rect x="80" y="318" width="140" height="28" class="pill"/>
  <text x="90" y="336" class="text">devops aat sync</text>

  <!-- Right: TID -->
  <rect x="600" y="220" width="320" height="150" class="box"/>
  <text x="620" y="248" class="label">TID — Terraform Infrastructure Deployment</text>
  <text x="620" y="270" class="text">Module, Envs, services/*.tfvars, Cloud‑Init</text>
  <rect x="620" y="285" width="280" height="28" class="pill"/>
  <text x="630" y="303" class="text">Pfad: /opt/TID  •  Repo: github.com/NiklasJavier/TID</text>
  <rect x="620" y="318" width="140" height="28" class="pill"/>
  <text x="630" y="336" class="text">devops tid sync</text>

  <!-- Arrows from SOT to AAT/TID -->
  <line x1="410" y1="200" x2="220" y2="235" class="arrow"/>
  <line x1="570" y1="200" x2="760" y2="235" class="arrow2"/>

  <!-- Footer note -->
  <text x="30" y="400" class="muted">SOT verwaltet Konfiguration (config.yaml), Logging und Vault. AAT automatisiert Konfiguration, TID provisioniert Infrastruktur.</text>
</svg>


